{% extends "base.html" %}{% block content %}<div class="panel"><h1>الإعدادات</h1><p>يمكنك هنا ضبط Smart Explorer وحدود الحفظ والاختبار.</p><form method="post"><div class="grid grid-2"><div><label>رقم الهاتف الافتراضي</label><input type="text" name="default_phone" value="{{ settings.default_phone }}" placeholder="+970..." /><label>الدومينات المسموح اختبارها</label><textarea name="allowed_domains" placeholder="example.com&#10;staging.example.com">{{ settings.allowed_domains }}</textarea></div><div><label>عدد الصفحات الأقصى</label><input type="number" name="max_pages" value="{{ settings.max_pages }}" min="3" max="60" /><label>عمق الزحف</label><input type="number" name="crawl_depth" value="{{ settings.crawl_depth }}" min="1" max="4" /><label>حد الثقة لقابلية الاختبار</label><input type="number" name="confidence_threshold" value="{{ settings.confidence_threshold }}" min="10" max="95" /><label>الحد الأدنى لحفظ النتيجة</label><input type="number" name="min_save_confidence" value="{{ settings.min_save_confidence }}" min="5" max="95" /><label>حد الضغطات الذكية</label><input type="number" name="explorer_click_limit" value="{{ settings.explorer_click_limit }}" min="1" max="10" /><label><input type="checkbox" name="smart_explorer" {% if settings.smart_explorer %}checked{% endif %}/> تفعيل Smart Explorer</label></div></div><div class="actions"><button class="btn" type="submit">حفظ الإعدادات</button></div></form></div>{% endblock %}
