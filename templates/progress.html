{% extends "base.html" %}{% block content %}<div class="panel"><h1>تقدم الفحص #{{ scan.id }}</h1><p id="statusText">جاري التحضير...</p><div class="progress-wrap"><div id="bar" class="progress-bar"></div></div><div class="small" id="percentText" style="margin-top:10px">0%</div></div><div class="grid grid-2" style="margin-top:18px"><div class="panel"><h2>ملخص التقدم</h2><p><strong>الحالة:</strong> <span id="scanStatus">{{ scan.status }}</span></p><p><strong>الهدف الحالي:</strong> <span id="currentTarget">—</span></p><p><strong>النتائج المكتشفة:</strong> <span id="findingsCount">0</span></p><p><strong>الأهداف المنجزة:</strong> <span id="completedTargets">0</span> / <span id="totalTargets">0</span></p><div class="actions"><a id="resultsBtn" class="btn secondary" href="{{ url_for('results', scan_id=scan.id) }}" style="display:none">عرض النتائج</a></div></div><div class="panel"><h2>الروابط التي يتم الزحف فيها</h2><div id="events" class="event-list"></div></div></div><script>const scanId={{ scan.id }};async function poll(){const res=await fetch(`/scan_status/${scanId}`);const data=await res.json();if(!data.ok)return;document.getElementById('scanStatus').textContent=data.status;document.getElementById('currentTarget').textContent=data.current_target||'—';document.getElementById('completedTargets').textContent=data.completed_targets;document.getElementById('totalTargets').textContent=data.total_targets;document.getElementById('findingsCount').textContent=data.findings_count;document.getElementById('percentText').textContent=data.percent+'%';document.getElementById('statusText').textContent=data.notes||(data.status==='running'?'جاري الفحص...':data.status);document.getElementById('bar').style.width=data.percent+'%';const wrap=document.getElementById('events');wrap.innerHTML='';data.events.forEach(ev=>{const div=document.createElement('div');div.className='event-item';div.innerHTML=`<div><strong>${ev.status}</strong></div><div class="small">${ev.target_label||''}</div><div class="small">${ev.url||''}</div>`;wrap.appendChild(div);});if(data.status==='done'||data.status==='failed'){document.getElementById('resultsBtn').style.display='inline-block';return;}setTimeout(poll,1500);}poll();</script>{% endblock %}
