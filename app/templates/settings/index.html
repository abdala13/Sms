{% extends 'base.html' %}{% block content %}<h1>الإعدادات المشتركة</h1><div class='grid two'><div class='card'><form method='post' action='/settings'><label>User Agents</label><textarea name='shared_user_agents' rows='8'>{{ settings_obj.shared_user_agents_json | join('
') }}</textarea><label>Rate limit / minute</label><input type='number' name='rate_limit_per_minute' value='{{ settings_obj.rate_limit_per_minute }}'><label>Timeout</label><input type='number' name='default_timeout_seconds' value='{{ settings_obj.default_timeout_seconds }}'><label>Retries</label><input type='number' name='retry_count' value='{{ settings_obj.retry_count }}'><label>Failure threshold</label><input type='number' name='repeated_failure_threshold' value='{{ settings_obj.repeated_failure_threshold }}'><button class='btn'>حفظ</button></form></div><div class='card'><h3>الحزم المعتمدة</h3><ul>{% for package in packages %}<li>{{ package.package_name }} — {{ package.category }}</li>{% endfor %}</ul></div></div>{% endblock %}
